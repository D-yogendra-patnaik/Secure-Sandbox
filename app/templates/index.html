<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecureScan • Malware Analysis</title>

<style>
:root {
    --bg-dark: #0f172a;
    --bg-card: #111827;
    --accent: #38bdf8;
    --danger: #ef4444;
    --safe: #22c55e;
    --muted: #94a3b8;
    --border: #1f2933;
    --text: #e5e7eb;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
}

.container {
    max-width: 960px;
    margin: auto;
}

header {
    margin-bottom: 30px;
}

header h1 {
    font-size: 36px;
    font-weight: 700;
}

header p {
    color: var(--muted);
    margin-top: 8px;
}

.card {
    background: linear-gradient(180deg, #020617, #020617);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    margin-bottom: 30px;
}

.upload-zone {
    border: 2px dashed var(--accent);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    transition: background .2s;
}

.upload-zone:hover {
    background: rgba(56,189,248,.05);
}

.upload-zone input {
    display: none;
}

.upload-label {
    display: inline-block;
    padding: 14px 30px;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: #020617;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
}

.filename {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
}

button {
    margin-top: 20px;
    padding: 14px 36px;
    border-radius: 999px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #020617;
    cursor: pointer;
}

button:disabled {
    background: #334155;
    cursor: not-allowed;
}

.loading {
    display: none;
    text-align: center;
    margin-top: 30px;
}

.spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #1e293b;
    border-top: 4px solid var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.results {
    display: none;
}

.section {
    background: #020617;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

.section h3 {
    margin: 0 0 12px;
    font-size: 18px;
    color: var(--accent);
}

.badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 10px;
}

.badge.malware { background: var(--danger); }
.badge.clean { background: var(--safe); }

pre {
    background: #020617;
    padding: 16px;
    border-radius: 10px;
    overflow-x: auto;
    font-size: 13px;
    border: 1px solid var(--border);
}

ul {
    padding-left: 20px;
}

li {
    margin-bottom: 8px;
    font-size: 14px;
}

footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
}
</style>
</head>

<body>
<div class="container">

<header>
    <h1>🛡️ SecureScan</h1>
    <p>Static + Dynamic + Machine Learning Malware Detection</p>
</header>

<div class="card">
    <form id="uploadForm" class="upload-zone">
        <label class="upload-label" for="fileInput">Select File</label>
        <input type="file" id="fileInput" required>
        <div class="filename" id="fileName">No file selected</div>
        <button type="submit" id="submitBtn">Analyze</button>
    </form>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 12px; color: var(--muted)">Analyzing sample in sandbox…</p>
    </div>
</div>

<div class="results" id="results">
    <div id="resultsContent"></div>
</div>

<footer>
    SecureScan © Malware Research Environment
</footer>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const uploadForm = document.getElementById("uploadForm");
const loading = document.getElementById("loading");
const results = document.getElementById("results");
const resultsContent = document.getElementById("resultsContent");
const submitBtn = document.getElementById("submitBtn");

fileInput.addEventListener("change", () => {
    fileName.textContent = fileInput.files[0]?.name || "No file selected";
});

uploadForm.addEventListener("submit", async e => {
    e.preventDefault();
    const fd = new FormData();
    fd.append("file", fileInput.files[0]);

    loading.style.display = "block";
    results.style.display = "none";
    submitBtn.disabled = true;

    try {
        const res = await fetch("/analyze", { method: "POST", body: fd });
        const data = await res.json();
        renderResults(data);
    } catch (err) {
        resultsContent.innerHTML = `<div class="section"><h3>Error</h3><p>${err}</p></div>`;
        results.style.display = "block";
    } finally {
        loading.style.display = "none";
        submitBtn.disabled = false;
    }
});

function renderResults(data) {
    const malware = data.ml_prediction?.malware;
    const badge = malware
        ? `<span class="badge malware">MALWARE</span>`
        : `<span class="badge clean">CLEAN</span>`;

    let html = `
        <div class="section">
            <h3>${data.filename} ${badge}</h3>
            <p><b>ML Confidence:</b> ${(data.ml_prediction?.score * 100).toFixed(1)}%</p>
        </div>
    `;

    if (data.static_analysis?.length) {
        html += `
            <div class="section">
                <h3>Static Analysis</h3>
                <ul>
                    ${data.static_analysis.map(r =>
                        `<li><b>${r.rule_id}</b> — ${r.message} (Line ${r.start_line})</li>`
                    ).join("")}
                </ul>
            </div>`;
    }

    if (data.dynamic_analysis) {
        const d = data.dynamic_analysis;
        html += `
            <div class="section">
                <h3>Dynamic Analysis</h3>
                ${d.ran
                    ? `<p>Exit Code: ${d.exit_code}</p>
                       <p>CPU: ${d.resource?.cpu_seconds}s | Memory: ${d.resource?.max_rss_mb} MB</p>
                       ${d.stdout ? `<pre>${d.stdout}</pre>` : ""}`
                    : `<p>${d.reason}</p>`
                }
            </div>`;
    }

    html += `
        <div class="section">
            <h3>Raw API Response</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
        </div>`;

    resultsContent.innerHTML = html;
    results.style.display = "block";
}
</script>

</body>
</html>
